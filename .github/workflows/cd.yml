name: CD

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 20m
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            echo "== fetch =="
            git fetch --prune origin
            git reset --hard origin/${{ github.ref_name }}
            echo "HEAD: $(git rev-parse --short HEAD)"

            echo "== build & up =="
            # Pass the git-derived version into the frontend build so the UI
            # shows the exact ref it was built from. git describe falls back
            # to the short SHA if no tag is reachable.
            export APP_VERSION=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)
            echo "APP_VERSION=$APP_VERSION"
            docker compose pull --ignore-buildable || true
            docker compose up -d --build --remove-orphans

            echo "== prune =="
            docker image prune -f

            echo "== backfill: vacancy stated salary =="
            # Idempotent — only touches profiles where salary_min/max is NULL.
            # Phase 2.7 schema landed in migration 0021 but prod had never
            # been backfilled; without this the UI salary badge is blank
            # across every card.
            docker compose exec -T backend bash -c 'cd /app && PYTHONPATH=/app python scripts/backfill_vacancy_salary.py' || true

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 3m
          script: |
            set -e
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "healthy after ${i}x2s"
                curl -s http://localhost:8000/health
                exit 0
              fi
              sleep 2
            done
            echo "health check failed"
            docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.yml ps
            exit 1
