# Phase 1.9 PR B2 — minimal skill taxonomy.
#
# Starting point: ~55 clusters across sre/devops/platform/observability/
# product_management/project_management/data_engineering/analytics.
# Intentionally narrow to current product audience (techy jobseekers).
# No legal, medical, construction, etc. — outside the ICP.
#
# Each entry:
#   concept: canonical slug (lowercase, underscore) — purely for audit.
#   domain: one of the MVP domains.
#   forms_ru / forms_en: interchangeable phrases the matcher treats
#     as equivalent. Both directions — if vacancy asks "планирование"
#     and resume says "project management", we want a match.
#
# Adding a cluster = pure append. Renaming a concept = breaking change
# (lives in vector cache keys etc.), so prefer to deprecate+add.

